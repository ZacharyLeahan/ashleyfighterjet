<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0b2a">
<title>Ashley's Fighter Jet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0b0b2a;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  #game {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    background: rgba(8, 8, 34, 0.55);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    transition: opacity 0.35s ease;
    z-index: 10;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .title {
    font-size: clamp(34px, 10vw, 64px);
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1.05;
    background: linear-gradient(180deg, #ffe36e 0%, #ff9d3f 45%, #ff5e8a 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 3px 10px rgba(255, 120, 60, 0.45));
    margin-bottom: 6px;
  }
  .subtitle {
    color: #bcd4ff;
    font-size: clamp(15px, 4.2vw, 20px);
    font-weight: 700;
    margin-bottom: 30px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .emoji-row { font-size: clamp(30px, 9vw, 48px); margin-bottom: 26px; letter-spacing: 8px; }
  .hint {
    color: #eaf2ff;
    font-size: clamp(14px, 3.9vw, 18px);
    font-weight: 600;
    margin-bottom: 8px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
  }
  .swipe-hand {
    font-size: clamp(26px, 8vw, 40px);
    margin: 8px 0 30px;
    animation: swipeDemo 1.8s ease-in-out infinite;
  }
  @keyframes swipeDemo {
    0%, 100% { transform: translateX(-38px) rotate(-8deg); }
    50%      { transform: translateX(38px) rotate(8deg); }
  }
  .tap-label {
    color: #fff;
    font-size: clamp(17px, 5vw, 24px);
    font-weight: 900;
    letter-spacing: 3px;
    padding: 14px 34px;
    border-radius: 999px;
    background: linear-gradient(180deg, #4f8cff, #2f5fe0);
    box-shadow: 0 6px 22px rgba(63, 110, 255, 0.55), inset 0 2px 0 rgba(255,255,255,0.35);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.07); }
  }
  .big-score {
    font-size: clamp(56px, 18vw, 110px);
    font-weight: 900;
    color: #ffe36e;
    text-shadow: 0 4px 18px rgba(255, 200, 60, 0.5);
    line-height: 1;
    margin-bottom: 4px;
  }
  .score-label {
    color: #bcd4ff; font-weight: 700;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 2px; margin-bottom: 18px;
  }
  .best-line {
    color: #9ff0c8; font-weight: 800;
    font-size: clamp(15px, 4.4vw, 20px);
    margin-bottom: 34px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .new-best {
    display: inline-block;
    color: #072; background: linear-gradient(180deg, #b6ffd9, #57e89c);
    border-radius: 999px; padding: 6px 18px;
    font-weight: 900; font-size: clamp(13px, 3.8vw, 17px);
    letter-spacing: 1px; margin-bottom: 22px;
    box-shadow: 0 4px 14px rgba(60, 230, 150, 0.45);
    animation: pulse 1.2s ease-in-out infinite;
  }
  #hud {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #hud.visible { opacity: 1; }
  #score {
    font-size: clamp(34px, 10vw, 52px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 18px rgba(120, 180, 255, 0.8), 0 3px 8px rgba(0,0,0,0.65);
    line-height: 1;
  }
  #score-sub {
    font-size: clamp(11px, 3vw, 13px);
    font-weight: 700; letter-spacing: 3px;
    color: #9db8e8;
    text-shadow: 0 2px 5px rgba(0,0,0,0.7);
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="score">0</div>
  <div id="score-sub">ALIENS DODGED</div>
</div>

<div id="menu" class="overlay">
  <div class="emoji-row">🛸 👾 🛸</div>
  <div class="title">Ashley's<br>Fighter Jet</div>
  <div class="subtitle">Dodge the silly aliens!</div>
  <div class="hint">Slide your thumb to steer &nbsp;•&nbsp; Tap to shoot!</div>
  <div class="swipe-hand">👆</div>
  <div class="tap-label">TAP TO FLY</div>
</div>

<div id="gameover" class="overlay hidden">
  <div class="subtitle" style="margin-bottom:10px">Oof! You got bonked! 💫</div>
  <div class="big-score" id="final-score">0</div>
  <div class="score-label">ALIENS DODGED</div>
  <div id="new-best-badge" class="new-best" style="display:none">🌟 NEW BEST! 🌟</div>
  <div class="best-line" id="best-line">Best: 0</div>
  <div class="tap-label">TAP TO FLY AGAIN</div>
</div>

<script>
(() => {
'use strict';

// ---------- Setup ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hudEl = document.getElementById('hud');
const scoreEl = document.getElementById('score');
const menuEl = document.getElementById('menu');
const overEl = document.getElementById('gameover');
const finalScoreEl = document.getElementById('final-score');
const bestLineEl = document.getElementById('best-line');
const newBestEl = document.getElementById('new-best-badge');

let W = 0, H = 0, DPR = 1, K = 1; // K = size scale factor relative to a 700px-tall screen
let bgCanvas = null;              // pre-rendered nebula backdrop
let vignetteCanvas = null;        // pre-rendered vignette overlay

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  K = H / 700;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildBackdrop();
  buildVignette();
  initStars();
  jet.w = Math.max(40, Math.min(W * 0.15, 72 * K));
  jet.y = H - jet.w * 1.7 - 14;
  jet.x = clamp(jet.x || W / 2, jet.w, W - jet.w);
  jet.targetX = jet.x;
}

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

// ---------- Pre-rendered backdrop (deep space nebula) ----------
function buildBackdrop() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = Math.round(W * DPR);
  bgCanvas.height = Math.round(H * DPR);
  const b = bgCanvas.getContext('2d');
  b.setTransform(DPR, 0, 0, DPR, 0, 0);

  // Vertical deep-space gradient
  const sky = b.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0.00, '#060618');
  sky.addColorStop(0.35, '#0d0d33');
  sky.addColorStop(0.70, '#1a1245');
  sky.addColorStop(1.00, '#2a1a55');
  b.fillStyle = sky;
  b.fillRect(0, 0, W, H);

  // Soft nebula clouds
  const blobs = [
    { x: 0.20, y: 0.18, r: 0.55, c: 'rgba(120, 60, 200, 0.16)' },
    { x: 0.85, y: 0.30, r: 0.50, c: 'rgba(50, 130, 220, 0.14)' },
    { x: 0.50, y: 0.60, r: 0.65, c: 'rgba(220, 70, 150, 0.10)' },
    { x: 0.10, y: 0.80, r: 0.45, c: 'rgba(40, 190, 190, 0.10)' },
    { x: 0.80, y: 0.85, r: 0.55, c: 'rgba(150, 80, 220, 0.12)' },
  ];
  for (const n of blobs) {
    const r = n.r * H * 0.6;
    const g = b.createRadialGradient(n.x * W, n.y * H, 0, n.x * W, n.y * H, r);
    g.addColorStop(0, n.c);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    b.fillStyle = g;
    b.fillRect(n.x * W - r, n.y * H - r, r * 2, r * 2);
  }

  // Faint baked-in distant stars
  for (let i = 0; i < 90; i++) {
    b.fillStyle = `rgba(255,255,255,${rand(0.05, 0.22)})`;
    const s = rand(0.5, 1.3);
    b.fillRect(Math.random() * W, Math.random() * H, s, s);
  }
}

function buildVignette() {
  vignetteCanvas = document.createElement('canvas');
  vignetteCanvas.width = Math.round(W * DPR);
  vignetteCanvas.height = Math.round(H * DPR);
  const v = vignetteCanvas.getContext('2d');
  v.setTransform(DPR, 0, 0, DPR, 0, 0);
  const g = v.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.45, W / 2, H / 2, Math.max(W, H) * 0.75);
  g.addColorStop(0, 'rgba(0,0,0,0)');
  g.addColorStop(1, 'rgba(0,0,20,0.42)');
  v.fillStyle = g;
  v.fillRect(0, 0, W, H);
}

// ---------- Parallax stars ----------
const starLayers = [];
function initStars() {
  starLayers.length = 0;
  const defs = [
    { count: 45, speed: 26,  size: [0.6, 1.2], alpha: [0.25, 0.5] },
    { count: 30, speed: 62,  size: [1.0, 1.8], alpha: [0.4, 0.75] },
    { count: 18, speed: 130, size: [1.5, 2.6], alpha: [0.6, 1.0] },
  ];
  for (const d of defs) {
    const stars = [];
    for (let i = 0; i < d.count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: rand(d.size[0], d.size[1]) * Math.max(K, 0.8),
        alpha: rand(d.alpha[0], d.alpha[1]),
        phase: Math.random() * Math.PI * 2,
        twinkle: rand(1.5, 4),
      });
    }
    starLayers.push({ speed: d.speed, stars });
  }
}

function updateAndDrawStars(dt, t, speedMul) {
  for (const layer of starLayers) {
    for (const s of layer.stars) {
      s.y += layer.speed * K * speedMul * dt;
      if (s.y > H + 4) { s.y = -4; s.x = Math.random() * W; }
      const tw = 0.72 + 0.28 * Math.sin(t * s.twinkle + s.phase);
      ctx.globalAlpha = s.alpha * tw;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ---------- Drifting planet (background decoration) ----------
const planet = { active: false, x: 0, y: 0, r: 0, hue: 0, hasRing: true, timer: 4 };
function updateAndDrawPlanet(dt, speedMul) {
  if (!planet.active) {
    planet.timer -= dt;
    if (planet.timer <= 0) {
      planet.active = true;
      planet.r = rand(34, 72) * K;
      planet.x = rand(planet.r, W - planet.r);
      planet.y = -planet.r * 2.5;
      planet.hue = pick([18, 160, 200, 268, 320]);
      planet.hasRing = Math.random() < 0.6;
    }
    return;
  }
  planet.y += 14 * K * speedMul * dt;
  if (planet.y > H + planet.r * 2.5) {
    planet.active = false;
    planet.timer = rand(14, 26);
    return;
  }
  const { x, y, r, hue } = planet;
  ctx.save();
  ctx.globalAlpha = 0.85;
  // Body with day/night shading
  const g = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.1, x, y, r);
  g.addColorStop(0, `hsl(${hue}, 65%, 68%)`);
  g.addColorStop(0.6, `hsl(${hue}, 60%, 45%)`);
  g.addColorStop(1, `hsl(${hue}, 55%, 22%)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  // Surface bands
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = `hsla(${hue}, 60%, 75%, 0.25)`;
  ctx.beginPath(); ctx.ellipse(x, y - r * 0.3, r * 1.1, r * 0.16, 0.1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x, y + r * 0.25, r * 1.1, r * 0.12, -0.08, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // Ring
  if (planet.hasRing) {
    ctx.strokeStyle = `hsla(${hue}, 70%, 80%, 0.5)`;
    ctx.lineWidth = r * 0.14;
    ctx.beginPath();
    ctx.ellipse(x, y, r * 1.65, r * 0.42, -0.35, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// ---------- Shooting stars ----------
const shootingStars = [];
let shootTimer = 3;
function updateAndDrawShootingStars(dt) {
  shootTimer -= dt;
  if (shootTimer <= 0) {
    shootTimer = rand(4, 9);
    const dir = Math.random() < 0.5 ? 1 : -1;
    shootingStars.push({
      x: rand(W * 0.15, W * 0.85), y: rand(-20, H * 0.3),
      vx: dir * rand(260, 420) * K, vy: rand(300, 480) * K,
      life: 0.7,
    });
  }
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.x += s.vx * dt; s.y += s.vy * dt; s.life -= dt;
    if (s.life <= 0) { shootingStars.splice(i, 1); continue; }
    const a = Math.min(1, s.life / 0.5);
    const len = 0.06;
    ctx.strokeStyle = `rgba(255,255,255,${0.75 * a})`;
    ctx.lineWidth = 2 * K;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(s.x - s.vx * len, s.y - s.vy * len);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
  }
}

// ---------- Jet ----------
const jet = { x: 0, y: 0, targetX: 0, vx: 0, w: 56, bank: 0 };

function drawJet(t, crashed) {
  const s = jet.w / 64; // designed at 64px half... full width 64 units
  ctx.save();
  ctx.translate(jet.x, jet.y + Math.sin(t * 2.2) * 2.5 * K); // gentle hover bob
  ctx.rotate(jet.bank * 0.30 + (crashed ? Math.sin(t * 9) * 0.25 : 0));
  ctx.scale(s, s);

  // --- Engine flames (drawn first, behind body) ---
  if (!crashed) {
    const flick = 0.75 + 0.25 * Math.sin(t * 31) * Math.sin(t * 17 + 1.3);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const fx of [-9, 9]) {
      const flameLen = 30 * flick;
      const fg = ctx.createLinearGradient(fx, 30, fx, 30 + flameLen);
      fg.addColorStop(0, 'rgba(255,255,255,0.95)');
      fg.addColorStop(0.25, 'rgba(255,210,80,0.9)');
      fg.addColorStop(0.7, 'rgba(255,110,40,0.55)');
      fg.addColorStop(1, 'rgba(255,60,20,0)');
      ctx.fillStyle = fg;
      ctx.beginPath();
      ctx.moveTo(fx - 5, 30);
      ctx.quadraticCurveTo(fx - 6, 30 + flameLen * 0.5, fx, 30 + flameLen);
      ctx.quadraticCurveTo(fx + 6, 30 + flameLen * 0.5, fx + 5, 30);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // --- Wings (swept delta) ---
  const wingG = ctx.createLinearGradient(0, -10, 0, 26);
  wingG.addColorStop(0, '#7fa8d8');
  wingG.addColorStop(1, '#3d5f95');
  ctx.fillStyle = wingG;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(-32, 22); ctx.lineTo(-30, 28); ctx.lineTo(-8, 24);
  ctx.lineTo(8, 24); ctx.lineTo(30, 28); ctx.lineTo(32, 22);
  ctx.closePath();
  ctx.fill();
  // Wing tips (accent)
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath(); ctx.moveTo(-32, 22); ctx.lineTo(-30, 28); ctx.lineTo(-24, 26.6); ctx.lineTo(-26.5, 20.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(32, 22); ctx.lineTo(30, 28); ctx.lineTo(24, 26.6); ctx.lineTo(26.5, 20.5); ctx.closePath(); ctx.fill();

  // --- Tail fins ---
  ctx.fillStyle = '#33507e';
  ctx.beginPath(); ctx.moveTo(-6, 18); ctx.lineTo(-15, 32); ctx.lineTo(-5, 30); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6, 18); ctx.lineTo(15, 32); ctx.lineTo(5, 30); ctx.closePath(); ctx.fill();

  // --- Fuselage ---
  const bodyG = ctx.createLinearGradient(-12, 0, 12, 0);
  bodyG.addColorStop(0, '#5b81b8');
  bodyG.addColorStop(0.5, '#c8ddf5');
  bodyG.addColorStop(1, '#5b81b8');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(0, -34);                       // nose tip
  ctx.quadraticCurveTo(9, -16, 10, 6);
  ctx.quadraticCurveTo(10, 24, 7, 30);
  ctx.lineTo(-7, 30);
  ctx.quadraticCurveTo(-10, 24, -10, 6);
  ctx.quadraticCurveTo(-9, -16, 0, -34);
  ctx.closePath();
  ctx.fill();

  // Nose cone accent
  ctx.fillStyle = '#ffb84d';
  ctx.beginPath();
  ctx.moveTo(0, -34);
  ctx.quadraticCurveTo(5.5, -24, 6.2, -18);
  ctx.quadraticCurveTo(0, -21, -6.2, -18);
  ctx.quadraticCurveTo(-5.5, -24, 0, -34);
  ctx.closePath();
  ctx.fill();

  // --- Cockpit canopy ---
  const glassG = ctx.createLinearGradient(0, -14, 0, 4);
  glassG.addColorStop(0, '#b8f4ff');
  glassG.addColorStop(1, '#2a9dc9');
  ctx.fillStyle = glassG;
  ctx.beginPath();
  ctx.ellipse(0, -6, 5.5, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glint
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath();
  ctx.ellipse(-1.8, -10, 1.6, 3.4, -0.25, 0, Math.PI * 2);
  ctx.fill();

  // Dizzy stars when crashed
  if (crashed) {
    ctx.fillStyle = '#ffe36e';
    ctx.font = '900 14px system-ui';
    ctx.textAlign = 'center';
    for (let i = 0; i < 3; i++) {
      const a = t * 3 + i * (Math.PI * 2 / 3);
      ctx.fillText('★', Math.cos(a) * 26, -40 + Math.sin(a) * 8);
    }
  }
  ctx.restore();
}

// Engine exhaust particle trail
const exhaust = [];
function spawnExhaust(dt) {
  // roughly 60 particles/sec
  if (Math.random() < dt * 60) {
    const side = Math.random() < 0.5 ? -1 : 1;
    exhaust.push({
      x: jet.x + side * 9 * (jet.w / 64) + rand(-2, 2),
      y: jet.y + 32 * (jet.w / 64),
      vx: rand(-14, 14) * K,
      vy: rand(110, 190) * K,
      r: rand(2, 4.5) * K,
      life: rand(0.35, 0.6),
      maxLife: 0.6,
    });
  }
}
function updateAndDrawExhaust(dt) {
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = exhaust.length - 1; i >= 0; i--) {
    const p = exhaust[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    if (p.life <= 0) { exhaust.splice(i, 1); continue; }
    const a = p.life / p.maxLife;
    ctx.fillStyle = `rgba(255, ${140 + a * 100 | 0}, 60, ${a * 0.5})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (0.5 + a * 0.7), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ---------- Aliens ----------
const ALIEN_PALETTES = [
  { main: '#8f5bff', light: '#c9a8ff', glow: 'rgba(150, 100, 255, 0.35)' },
  { main: '#ff5e8a', light: '#ffb3c8', glow: 'rgba(255, 100, 150, 0.35)' },
  { main: '#2ec5ff', light: '#a8e8ff', glow: 'rgba(60, 190, 255, 0.35)' },
  { main: '#ffb020', light: '#ffe0a0', glow: 'rgba(255, 180, 50, 0.35)' },
  { main: '#3fe08f', light: '#aef5d2', glow: 'rgba(70, 225, 150, 0.35)' },
];
const aliens = [];
let spawnTimer = 1.2;
let lastSpawnX = -999;

function spawnAlien() {
  const r = rand(20, 34) * Math.max(K, 0.75);
  let x;
  let tries = 0;
  do {
    x = rand(r + 6, W - r - 6);
    tries++;
  } while (Math.abs(x - lastSpawnX) < W * 0.22 && tries < 8);
  lastSpawnX = x;

  const type = Math.random() < 0.55 ? 'ufo' : 'blob';
  aliens.push({
    type, x, y: -r * 2.2, r,
    baseX: x,
    speed: (150 + difficulty * 230) * K * rand(0.85, 1.15),
    wobbleAmp: Math.random() < 0.55 ? rand(20, 70) * K : 0,
    wobbleFreq: rand(1.2, 2.6),
    phase: Math.random() * Math.PI * 2,
    spin: rand(-0.6, 0.6),
    palette: pick(ALIEN_PALETTES),
    t: 0,
  });
}

function updateAliens(dt) {
  for (let i = aliens.length - 1; i >= 0; i--) {
    const a = aliens[i];
    a.t += dt;
    a.y += a.speed * dt;
    if (a.wobbleAmp) {
      a.x = a.baseX + Math.sin(a.t * a.wobbleFreq + a.phase) * a.wobbleAmp;
      a.x = clamp(a.x, a.r, W - a.r);
    }
    if (a.y > H + a.r * 2.5) {
      aliens.splice(i, 1);
      score++;
      scoreEl.textContent = score;
      spawnPopup(a.x, H - 60 * K);
    }
  }
}

function drawAlien(a, t) {
  const { x, y, r, palette: p } = a;
  ctx.save();
  ctx.translate(x, y);

  // Soft glow aura
  const glow = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 2.1);
  glow.addColorStop(0, p.glow);
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, r * 2.1, 0, Math.PI * 2);
  ctx.fill();

  // Cute eyes look toward the jet
  const lookX = clamp((jet.x - x) / W * 3, -1, 1);

  if (a.type === 'ufo') {
    ctx.rotate(Math.sin(a.t * 1.8 + a.phase) * 0.12);
    // Glass dome
    const domeG = ctx.createLinearGradient(0, -r, 0, 0);
    domeG.addColorStop(0, 'rgba(200, 245, 255, 0.9)');
    domeG.addColorStop(1, 'rgba(120, 200, 235, 0.45)');
    ctx.fillStyle = domeG;
    ctx.beginPath();
    ctx.arc(0, -r * 0.18, r * 0.62, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
    // Little green pilot inside dome
    ctx.fillStyle = '#6fdd6f';
    ctx.beginPath();
    ctx.arc(0, -r * 0.38, r * 0.30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e'; // eyes
    ctx.beginPath();
    ctx.arc(-r * 0.11 + lookX * r * 0.05, -r * 0.42, r * 0.055, 0, Math.PI * 2);
    ctx.arc( r * 0.11 + lookX * r * 0.05, -r * 0.42, r * 0.055, 0, Math.PI * 2);
    ctx.fill();
    // Saucer body
    const bodyG = ctx.createLinearGradient(0, -r * 0.3, 0, r * 0.5);
    bodyG.addColorStop(0, p.light);
    bodyG.addColorStop(0.5, p.main);
    bodyG.addColorStop(1, shade(p.main));
    ctx.fillStyle = bodyG;
    ctx.beginPath();
    ctx.ellipse(0, 0, r, r * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();
    // Blinking rim lights
    for (let i = 0; i < 5; i++) {
      const lx = -r * 0.72 + (i / 4) * r * 1.44;
      const ly = Math.sqrt(Math.max(0, 1 - (lx / r) ** 2)) * r * 0.30;
      const on = Math.sin(t * 5 + i * 1.7 + a.phase) > 0;
      ctx.fillStyle = on ? '#fff8b8' : 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(lx, ly, r * 0.075, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // Blob alien: squishy jelly with antenna
    const squish = 1 + Math.sin(a.t * 5 + a.phase) * 0.07;
    ctx.scale(1 / squish, squish);
    // Antenna
    ctx.strokeStyle = p.main;
    ctx.lineWidth = r * 0.09;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.8);
    ctx.quadraticCurveTo(r * 0.15, -r * 1.15, Math.sin(a.t * 3) * r * 0.12, -r * 1.35);
    ctx.stroke();
    ctx.fillStyle = '#fff8b8';
    ctx.beginPath();
    ctx.arc(Math.sin(a.t * 3) * r * 0.12, -r * 1.35, r * 0.14, 0, Math.PI * 2);
    ctx.fill();
    // Body
    const bodyG = ctx.createRadialGradient(-r * 0.3, -r * 0.35, r * 0.15, 0, 0, r);
    bodyG.addColorStop(0, p.light);
    bodyG.addColorStop(0.65, p.main);
    bodyG.addColorStop(1, shade(p.main));
    ctx.fillStyle = bodyG;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2);
    ctx.fill();
    // Eyes (googly, tracking the jet)
    for (const ex of [-r * 0.3, r * 0.3]) {
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(ex, -r * 0.15, r * 0.24, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(ex + lookX * r * 0.1, -r * 0.13 + r * 0.06, r * 0.11, 0, Math.PI * 2);
      ctx.fill();
    }
    // Smile
    ctx.strokeStyle = 'rgba(20, 20, 46, 0.75)';
    ctx.lineWidth = r * 0.07;
    ctx.beginPath();
    ctx.arc(0, r * 0.22, r * 0.3, 0.25 * Math.PI, 0.75 * Math.PI);
    ctx.stroke();
  }
  ctx.restore();
}

// Darken a hex color (simple, for gradient bottoms)
const shadeCache = {};
function shade(hex) {
  if (shadeCache[hex]) return shadeCache[hex];
  const n = parseInt(hex.slice(1), 16);
  const r = ((n >> 16) & 255) * 0.55 | 0;
  const g = ((n >> 8) & 255) * 0.55 | 0;
  const b = (n & 255) * 0.55 | 0;
  return (shadeCache[hex] = `rgb(${r},${g},${b})`);
}

// ---------- "+1" popups ----------
const popups = [];
function spawnPopup(x, y) {
  popups.push({ x: clamp(x, 30, W - 30), y, life: 0.9 });
}
function updateAndDrawPopups(dt) {
  ctx.textAlign = 'center';
  ctx.font = `900 ${Math.round(22 * Math.max(K, 0.8))}px system-ui`;
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y -= 55 * K * dt;
    p.life -= dt;
    if (p.life <= 0) { popups.splice(i, 1); continue; }
    const a = Math.min(1, p.life / 0.4);
    ctx.fillStyle = `rgba(159, 240, 200, ${a})`;
    ctx.fillText('+1', p.x, p.y);
  }
}

// ---------- Bullets ----------
const bullets = [];
function fireBullet() {
  if (state !== 'playing') return;
  const s = jet.w / 64;
  bullets.push({ x: jet.x, y: jet.y - 36 * s, vy: -980 * K });
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy * dt;
    if (b.y < -30) { bullets.splice(i, 1); continue; }
    for (let j = aliens.length - 1; j >= 0; j--) {
      const a = aliens[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const rr = a.r * 0.9 + 6 * K;
      if (dx * dx + dy * dy < rr * rr) {
        spawnBurst(a.x, a.y, a.r, a.palette);
        aliens.splice(j, 1);
        bullets.splice(i, 1);
        score++;
        scoreEl.textContent = score;
        spawnPopup(a.x, a.y);
        break;
      }
    }
  }
}

function drawBullets() {
  if (!bullets.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bullets) {
    // Trailing streak
    const trail = 26 * K;
    const g = ctx.createLinearGradient(b.x, b.y + trail, b.x, b.y);
    g.addColorStop(0, 'rgba(255,160,60,0)');
    g.addColorStop(1, 'rgba(255,220,120,0.9)');
    ctx.strokeStyle = g;
    ctx.lineWidth = 5 * K;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y + trail);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    // Glowing head
    const hg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 9 * K);
    hg.addColorStop(0, 'rgba(255,255,255,0.95)');
    hg.addColorStop(0.4, 'rgba(255,230,110,0.8)');
    hg.addColorStop(1, 'rgba(255,180,60,0)');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 9 * K, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ---------- Pop bursts (alien defeat effect) ----------
const bursts = [];
function spawnBurst(x, y, r, p) {
  bursts.push({ type: 'ring', x, y, r: r * 0.5, maxR: r * 2.2, life: 0.35, maxLife: 0.35, color: p.light });
  const n = 14;
  for (let i = 0; i < n; i++) {
    const ang = (i / n) * Math.PI * 2 + rand(-0.3, 0.3);
    const sp = rand(70, 240) * K * (r / 26);
    bursts.push({
      type: 'dot', x, y,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
      r: rand(2, 5) * Math.max(K, 0.8),
      life: rand(0.35, 0.65), maxLife: 0.65,
      color: pick([p.light, p.main, '#fff8b8', '#ffffff']),
    });
  }
}

function updateAndDrawBursts(dt) {
  if (!bursts.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = bursts.length - 1; i >= 0; i--) {
    const p = bursts[i];
    p.life -= dt;
    if (p.life <= 0) { bursts.splice(i, 1); continue; }
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    if (p.type === 'ring') {
      const rr = p.r + (1 - a) * (p.maxR - p.r);
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 3 * K * a + 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= (1 - 2.4 * dt); p.vy *= (1 - 2.4 * dt);
      p.vy += 40 * K * dt;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.4 + 0.6 * a), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---------- Game state ----------
let state = 'menu'; // 'menu' | 'playing' | 'over'
let score = 0;
let best = 0;
try { best = parseInt(localStorage.getItem('ashleyJetBest') || '0', 10) || 0; } catch (e) {}
let elapsed = 0;
let difficulty = 0;
let crashTime = 0;

function startGame() {
  aliens.length = 0;
  popups.length = 0;
  exhaust.length = 0;
  bullets.length = 0;
  bursts.length = 0;
  score = 0;
  elapsed = 0;
  difficulty = 0;
  spawnTimer = 1.0;
  jet.x = jet.targetX = W / 2;
  jet.bank = 0;
  scoreEl.textContent = '0';
  menuEl.classList.add('hidden');
  overEl.classList.add('hidden');
  hudEl.classList.add('visible');
  state = 'playing';
}

function gameOver() {
  state = 'over';
  crashTime = 0;
  hudEl.classList.remove('visible');
  const isNewBest = score > best;
  if (isNewBest) {
    best = score;
    try { localStorage.setItem('ashleyJetBest', String(best)); } catch (e) {}
  }
  finalScoreEl.textContent = score;
  bestLineEl.textContent = 'Best: ' + best;
  newBestEl.style.display = isNewBest && score > 0 ? 'inline-block' : 'none';
  setTimeout(() => overEl.classList.remove('hidden'), 850);
}

function checkCollision() {
  const jr = jet.w * 0.30; // forgiving hitbox
  const jx = jet.x, jy = jet.y;
  for (const a of aliens) {
    const ar = a.r * 0.72;
    const dx = a.x - jx, dy = a.y - jy;
    if (dx * dx + dy * dy < (jr + ar) * (jr + ar)) return true;
  }
  return false;
}

// ---------- Input ----------
let dragging = false;
let lastPointerX = 0;
let overSince = 0;
let downX = 0, downY = 0, downTime = 0;
const DRAG_SENSITIVITY = 1.55;
const TAP_MAX_DIST = 14;   // px of finger travel before a press counts as a drag
const TAP_MAX_MS = 280;    // press longer than this = steering, not shooting

window.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (state === 'menu') { startGame(); return; }
  if (state === 'over') {
    // small delay so a frantic dodge-tap doesn't instantly restart
    if (performance.now() - overSince > 900) startGame();
    return;
  }
  dragging = true;
  lastPointerX = e.clientX;
  downX = e.clientX;
  downY = e.clientY;
  downTime = performance.now();
}, { passive: false });

window.addEventListener('pointermove', (e) => {
  if (!dragging || state !== 'playing') return;
  e.preventDefault();
  const dx = e.clientX - lastPointerX;
  lastPointerX = e.clientX;
  jet.targetX = clamp(jet.targetX + dx * DRAG_SENSITIVITY, jet.w * 0.55, W - jet.w * 0.55);
}, { passive: false });

window.addEventListener('pointerup', (e) => {
  if (dragging && state === 'playing') {
    const dist = Math.hypot(e.clientX - downX, e.clientY - downY);
    if (dist < TAP_MAX_DIST && performance.now() - downTime < TAP_MAX_MS) fireBullet();
  }
  dragging = false;
});
window.addEventListener('pointercancel', () => { dragging = false; });

// Keyboard (desktop testing)
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter')) {
    if (state === 'menu') startGame();
    else if (state === 'over' && performance.now() - overSince > 900) startGame();
    else if (state === 'playing') fireBullet();
  }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Block iOS double-tap zoom / gesture zoom
document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => e.preventDefault());

// ---------- Main loop ----------
let lastTime = performance.now();

function frame(now) {
  requestAnimationFrame(frame);
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0.1) dt = 0.1; // tab-switch clamp
  const t = now / 1000;

  const playing = state === 'playing';
  const starSpeed = playing ? 1 + difficulty * 1.4 : 0.5;

  // -- Update --
  if (playing) {
    elapsed += dt;
    difficulty = Math.min(1, elapsed / 90);

    // Keyboard steering
    const kv = (keys.ArrowRight || keys.d ? 1 : 0) - (keys.ArrowLeft || keys.a ? 1 : 0);
    if (kv) jet.targetX = clamp(jet.targetX + kv * 640 * K * dt, jet.w * 0.55, W - jet.w * 0.55);

    // Jet eases toward target
    const prevX = jet.x;
    jet.x += (jet.targetX - jet.x) * Math.min(1, dt * 14);
    jet.vx = (jet.x - prevX) / Math.max(dt, 0.001);
    jet.bank += (clamp(jet.vx / 900, -1, 1) - jet.bank) * Math.min(1, dt * 10);

    // Spawn aliens
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnAlien();
      const gap = 1.15 - difficulty * 0.72; // 1.15s -> 0.43s
      spawnTimer = gap * rand(0.75, 1.25);
    }

    updateAliens(dt);
    updateBullets(dt);
    spawnExhaust(dt);

    if (checkCollision()) {
      overSince = performance.now();
      gameOver();
    }
  } else if (state === 'over') {
    crashTime += dt;
    jet.bank *= 0.98;
    // Aliens drift on gently behind the game-over screen
    for (const a of aliens) a.y += a.speed * 0.25 * dt;
    // In-flight bullets keep going (no collisions after the bonk)
    for (let i = bullets.length - 1; i >= 0; i--) {
      bullets[i].y += bullets[i].vy * dt;
      if (bullets[i].y < -30) bullets.splice(i, 1);
    }
  }

  // -- Draw --
  ctx.drawImage(bgCanvas, 0, 0, W, H);
  updateAndDrawPlanet(dt, starSpeed);
  updateAndDrawStars(dt, t, starSpeed);
  updateAndDrawShootingStars(dt);
  updateAndDrawExhaust(dt);
  for (const a of aliens) drawAlien(a, t);
  drawBullets();
  updateAndDrawBursts(dt);
  if (state !== 'menu') drawJet(t, state === 'over');
  updateAndDrawPopups(dt);
  ctx.drawImage(vignetteCanvas, 0, 0, W, H);
}

// ---------- Go ----------
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));
resize();
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
